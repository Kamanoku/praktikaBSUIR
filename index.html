<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка соответствия ФИО и пола</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
    }

    h1 { font-size: 1.5rem; color: #1a202c; margin-bottom: 8px; }

    .subtitle { color: #718096; font-size: .9rem; margin-bottom: 28px; }

    label { display: block; font-weight: 600; color: #2d3748; margin-bottom: 8px; }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color .2s;
      outline: none;
    }
    input[type="text"]:focus    { border-color: #667eea; }
    input[type="text"].invalid  { border-color: #fc8181; background: #fff5f5; }

    /* ── Выбор пола (radio-кнопки в виде сегментов) ── */
    .gender-select {
      margin-top: 20px;
    }
    .gender-options {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .gender-option {
      flex: 1;
      position: relative;
    }
    .gender-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: pointer;
    }
    .gender-option .option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-weight: 600;
      color: #718096;
      transition: all .15s;
      cursor: pointer;
      user-select: none;
    }
    .gender-option input:checked + .option-label {
      border-color: #667eea;
      background: #ebf4ff;
      color: #4c51bf;
    }
    .gender-option:nth-child(2) input:checked + .option-label {
      border-color: #ed64a6;
      background: #fff5f9;
      color: #b83280;
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    button:hover    { opacity: .9; }
    button:active   { transform: scale(.98); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    button.force-mode {
      background: linear-gradient(135deg, #ed8936, #dd6b20);
    }

    #result-box {
      margin-top: 24px;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: .95rem;
      display: none;
      line-height: 1.6;
    }

    #result-box.info     { background: #ebf8ff; border: 1px solid #90cdf4; color: #2b6cb0; }
    #result-box.warning  { background: #fffbeb; border: 1px solid #f6e05e; color: #744210; }
    #result-box.success  { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    #result-box.error    { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; }
    #result-box.mismatch { background: #fff5f5; border: 1px solid #fc8181; color: #9b2c2c; }

    .validation-detail {
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(0,0,0,.04);
      border-radius: 8px;
      font-size: .85rem;
      line-height: 1.5;
    }
    .validation-detail .reason { font-weight: 600; }
    .validation-detail .hint   { color: inherit; opacity: .8; margin-top: 3px; }

    #attempt-counter {
      margin-top: 12px;
      font-size: .8rem;
      color: #a0aec0;
      text-align: right;
    }

    .gender-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1.05em;
    }
    .badge-m { background: #bee3f8; color: #2a69ac; }
    .badge-f { background: #fed7e2; color: #97266d; }
    .badge-u { background: #e2e8f0; color: #718096; }

    .compare-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .compare-arrow { color: #a0aec0; font-size: 1.1em; }

    .conf-bar-wrap { margin-top: 10px; }
    .conf-bar-bg {
      background: #e2e8f0;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #f6ad55, #48bb78);
      transition: width .4s ease;
    }
    .conf-label { font-size: .78rem; color: #718096; margin-top: 4px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🔍 Проверка соответствия ФИО и пола</h1>
  <p class="subtitle">Введите ФИО и укажите ожидаемый пол — модель проверит совпадение</p>

  <label for="fio-input">Фамилия Имя Отчество</label>
  <input
    id="fio-input"
    type="text"
    placeholder="Иванов Иван Иванович"
    autocomplete="off"
  />

  <div class="gender-select">
    <label>Выберите пол</label>
    <div class="gender-options">
      <div class="gender-option">
        <input type="radio" name="gender" id="gender-male" value="male" checked />
        <label class="option-label" for="gender-male">👨 Мужской</label>
      </div>
      <div class="gender-option">
        <input type="radio" name="gender" id="gender-female" value="female" />
        <label class="option-label" for="gender-female">👩 Женский</label>
      </div>
    </div>
  </div>

  <button id="check-btn" onclick="handleSubmit()">Проверить</button>

  <div id="result-box" role="alert"></div>
  <div id="attempt-counter"></div>
</div>

<script>
  const API_URL = "http://127.0.0.1:5000/predict";

  // Состояние для счётчика попыток / кеша последнего запроса
  let attemptCount    = 0;
  let lastFIO         = "";
  let lastGender       = "";
  let lastResult       = null;

  // ── UI-хелперы ────────────────────────────────────────────

  function showResult(html, cssClass) {
    const box = document.getElementById("result-box");
    box.className     = cssClass;
    box.innerHTML     = html;
    box.style.display = "block";
  }

  function updateCounter(n, max) {
    document.getElementById("attempt-counter").textContent =
      n > 0 ? `Попытка ${n} из ${max}` : "";
  }

  function setInputInvalid(invalid) {
    const inp = document.getElementById("fio-input");
    if (invalid) inp.classList.add("invalid");
    else         inp.classList.remove("invalid");
  }

  function setForceMode(on) {
    const btn = document.getElementById("check-btn");
    if (on) {
      btn.textContent = "Да, я уверен — принять";
      btn.classList.add("force-mode");
    } else {
      btn.textContent = "Проверить";
      btn.classList.remove("force-mode");
    }
  }

  function getSelectedGender() {
    return document.querySelector('input[name="gender"]:checked').value;
  }

  function genderLabel(code) {
    return code === "female" ? "Женский" : "Мужской";
  }

  function genderBadgeClass(code) {
    return code === "female" ? "badge-f" : "badge-m";
  }

  /** Карточка с сопоставлением «выбрано» vs «предсказано» + шкала уверенности */
  function buildCompareHTML(data) {
    const selLabel  = genderLabel(data.selected_gender);
    const selBadge  = genderBadgeClass(data.selected_gender);
    const predLabel = data.predicted_gender;
    const predBadge = predLabel === "Женский" ? "badge-f"
                     : predLabel === "Мужской" ? "badge-m" : "badge-u";
    const pct       = Math.round(data.confidence * 100);

    return `
      <div class="compare-row">
        <span>Выбрано:</span>
        <span class="gender-badge ${selBadge}">${selLabel}</span>
        <span class="compare-arrow">↔</span>
        <span>Модель предполагает:</span>
        <span class="gender-badge ${predBadge}">${predLabel}</span>
      </div>
      <div class="conf-bar-wrap">
        <div class="conf-bar-bg">
          <div class="conf-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="conf-label">Уверенность модели: ${pct}%</div>
      </div>`;
  }

  function buildValidationHTML(warning) {
    return `
      <div class="validation-detail">
        <div class="reason">🔎 ${warning.reason}</div>
        <div class="hint">💡 ${warning.hint}</div>
      </div>`;
  }

  // ── Основная логика ───────────────────────────────────────

async function handleSubmit() {
    const fio    = document.getElementById("fio-input").value.trim();
    const gender = getSelectedGender();

    if (!fio) {
      setInputInvalid(true);
      showResult("⚠️ Пожалуйста, введите ФИО.", "error");
      return;
    }

    // Сброс состояния, если ФИО или выбор пола изменились
    if (fio !== lastFIO || gender !== lastGender) {
      attemptCount = 0;
      lastResult   = null;
      lastFIO      = fio;
      lastGender   = gender;
      setInputInvalid(false);
    }

    // ── ПОВТОРНОЕ НАЖАТИЕ: принудительное подтверждение ──────
    if (attemptCount >= 1 && lastResult) {
      attemptCount++;
      updateCounter(attemptCount, 2);
      setInputInvalid(false);

      const wasValidationWarn = !!lastResult.warning;
      const wasMismatch       = lastResult.match === false;

      let extraNote = "";
      if (wasValidationWarn) {
        extraNote = `<br><em style="font-size:.85rem;opacity:.7">
                        Принято несмотря на предупреждение валидации.
                      </em>`;
      } else if (wasMismatch) {
        extraNote = `<br><em style="font-size:.85rem;opacity:.7">
                        Пользователь подтвердил пол «${genderLabel(lastResult.selected_gender)}»,
                        несмотря на несовпадение с предсказанием модели.
                      </em>`;
      }

      showResult(
        `✅ <strong>Данные успешно приняты.</strong>${extraNote}<br>${buildCompareHTML(lastResult)}`,
        "success"
      );
      setForceMode(false);
      return;
    }

    // ── ПЕРВАЯ ОТПРАВКА ───────────────────────────────────────
    const btn = document.getElementById("check-btn");
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = "Анализирую…";
    showResult("⏳ Отправляю запрос к модели…", "info");

    let data;
    try {
      const resp = await fetch(API_URL, {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ fio, selected_gender: gender })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${resp.status}`);
      }

      data = await resp.json();
    } catch (err) {
      showResult(`❌ Ошибка соединения с сервером: ${err.message}`, "error");
      btn.disabled = false;
      btn.textContent = originalLabel;
      return;
    } finally {
      btn.disabled = false;
      if (btn.textContent === "Анализирую…") btn.textContent = originalLabel;
    }

    lastResult = data;
    attemptCount++;
    updateCounter(attemptCount, 2);

    // ── ВЕТКА А: сервер заблокировал ввод на этапе валидации ──
    if (data.warning) {
      setInputInvalid(true);

      // ВСПЛЫВАЮЩЕЕ ОКНО ALERT УБРАНО ОТСЮДА

      showResult(
        `⚠️ <strong>Модель сомневается в корректности ввода.</strong>` +
        buildValidationHTML(data.warning) +
        `<br><em>Нажмите «Да, я уверен — принять», если хотите принять данные как есть.</em>`,
        "warning"
      );

      setForceMode(true);
      return;
    }

    setInputInvalid(false);

    // ── ВЕТКА Б: пол НЕ совпал с предсказанием модели ─────────
    if (data.match === false) {

      // ВСПЛЫВАЮЩЕЕ ОКНО ALERT УБРАНО ОТСЮДА

      showResult(
        `⚠️ <strong>Указанный пол не совпадает с предсказанием модели.</strong><br>
         ${buildCompareHTML(data)}<br>
         <em>Нажмите «Да, я уверен — принять», чтобы подтвердить ваш выбор.</em>`,
        "mismatch"
      );

      setForceMode(true);
      return;
    }

    // ── ВЕТКА В: пол совпал с предсказанием ───────────────────
    updateCounter(0, 2);
    showResult(
      `✅ <strong>Данные приняты — пол подтверждён моделью.</strong><br>${buildCompareHTML(data)}`,
      "success"
    );
    setForceMode(false);
  }

  // ── Сброс при изменении поля или выбора пола ──────────────
  document.getElementById("fio-input").addEventListener("input", () => {
    const val = document.getElementById("fio-input").value.trim();
    if (val !== lastFIO) {
      attemptCount = 0;
      lastResult   = null;
      setForceMode(false);
      setInputInvalid(false);
      document.getElementById("result-box").style.display = "none";
      updateCounter(0, 2);
    }
  });

  document.querySelectorAll('input[name="gender"]').forEach(radio => {
    radio.addEventListener("change", () => {
      const g = getSelectedGender();
      if (g !== lastGender) {
        attemptCount = 0;
        lastResult   = null;
        setForceMode(false);
        setInputInvalid(false);
        document.getElementById("result-box").style.display = "none";
        updateCounter(0, 2);
      }
    });
  });

  document.getElementById("fio-input").addEventListener("keydown", e => {
    if (e.key === "Enter") handleSubmit();
  });
</script>
</body>
</html>
